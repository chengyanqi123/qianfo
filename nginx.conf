# 静态文件根目录，dist 产物直接放在对应子目录下：
# h5   ->  /www/qianfo/h5/index.html
# web  ->  /www/qianfo/web/index.html

# HTTP
server {
    listen 80;
    server_name your-server-name;

    root /www/qianfo;

    return 301 https://$host$request_uri;
}

# HTTPS（需要 SSL 证书）
server {
    listen 443 ssl;
    server_name your-server-name;

    ssl_certificate     /etc/nginx/ssl/your-cert.pem;      # ← 替换为你的证书路径
    ssl_certificate_key /etc/nginx/ssl/your-cert-key.pem;  # ← 替换为你的私钥路径

    root /www/qianfo;

    location /h5/ {
        try_files $uri $uri/ /h5/index.html;
    }

    location /web/ {
        try_files $uri $uri/ /web/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:10011/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        return 302 /web/;
    }
}
