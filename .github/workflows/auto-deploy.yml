name: Auto Deploy to Server

on:
  push:
    branches: [master]
    paths:
      - 'apps/h5/**'
      - 'apps/web/**'
      - 'packages/shared/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          CHANGES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          echo "Changed files:"
          echo "$CHANGES"

          SHARED=$(echo "$CHANGES" | grep -q "packages/shared/" && echo "true" || echo "false")
          H5=$(echo "$CHANGES" | grep -q "apps/h5/" && echo "true" || echo "false")
          WEB=$(echo "$CHANGES" | grep -q "apps/web/" && echo "true" || echo "false")

          # shared 变了，h5 和 web 都需要重新打包
          DEPLOY_H5=$( [ "$H5" = "true" ] || [ "$SHARED" = "true" ] && echo "true" || echo "false" )
          DEPLOY_WEB=$( [ "$WEB" = "true" ] || [ "$SHARED" = "true" ] && echo "true" || echo "false" )

          echo "deploy_h5=$DEPLOY_H5" >> $GITHUB_OUTPUT
          echo "deploy_web=$DEPLOY_WEB" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build apps in parallel
        run: |
          pids=()
          if [ "$DEPLOY_H5" = "true" ]; then
            echo "Building H5..."
            pnpm run build:h5 &
            pids+=($!)
          fi
          if [ "$DEPLOY_WEB" = "true" ]; then
            echo "Building Web..."
            pnpm run build:web &
            pids+=($!)
          fi
          # 等待所有构建完成，任一失败则整体失败
          for pid in "${pids[@]}"; do
            wait "$pid" || exit 1
          done
        env:
          DEPLOY_H5: ${{ steps.changes.outputs.deploy_h5 }}
          DEPLOY_WEB: ${{ steps.changes.outputs.deploy_web }}
          VITE_WX_APP_ID: ${{ secrets.APP_ID }}
          VITE_SITE_ADDRESS: ${{ secrets.H5_SITE }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          pids=()
          if [ "$DEPLOY_H5" = "true" ]; then
            echo "Deploying H5..."
            rsync -avz --delete --exclude='MP_verify_*' -e "ssh -i ~/.ssh/id_rsa" \
              ./apps/h5/dist/ \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/www/qianfo/h5 &
            pids+=($!)
          fi
          if [ "$DEPLOY_WEB" = "true" ]; then
            echo "Deploying Web..."
            rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" \
              ./apps/web/dist/ \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/www/qianfo/web &
            pids+=($!)
          fi
          for pid in "${pids[@]}"; do
            wait "$pid" || exit 1
          done
        env:
          DEPLOY_H5: ${{ steps.changes.outputs.deploy_h5 }}
          DEPLOY_WEB: ${{ steps.changes.outputs.deploy_web }}

      - name: Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- H5: ${{ steps.changes.outputs.deploy_h5 == 'true' && '✅ deployed' || '⏭️ skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web: ${{ steps.changes.outputs.deploy_web == 'true' && '✅ deployed' || '⏭️ skipped' }}" >> $GITHUB_STEP_SUMMARY
