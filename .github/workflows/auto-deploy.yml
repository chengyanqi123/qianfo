name: Auto Deploy to OSS

on:
  push:
    branches: [master]
    paths:
      - 'apps/h5/**'
      - 'apps/web/**'
      - 'packages/shared/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      OSSUTIL_VERSION: 2.2.1
      OSSUTIL_LINUX_AMD64_SHA256: fbf1026bd383a5d9bee051cd64a6226c730357ba569491f7c7b91af66560ef1d
      ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
      ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
      ALIYUN_OSS_H5_PREFIX: ${{ secrets.ALIYUN_OSS_H5_PREFIX }}
      ALIYUN_OSS_WEB_PREFIX: ${{ secrets.ALIYUN_OSS_WEB_PREFIX }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          CHANGES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          echo "Changed files:"
          echo "$CHANGES"

          SHARED=$(echo "$CHANGES" | grep -q "packages/shared/" && echo "true" || echo "false")
          H5=$(echo "$CHANGES" | grep -q "apps/h5/" && echo "true" || echo "false")
          WEB=$(echo "$CHANGES" | grep -q "apps/web/" && echo "true" || echo "false")

          # shared 变了，h5 和 web 都需要重新打包
          DEPLOY_H5=$( [ "$H5" = "true" ] || [ "$SHARED" = "true" ] && echo "true" || echo "false" )
          DEPLOY_WEB=$( [ "$WEB" = "true" ] || [ "$SHARED" = "true" ] && echo "true" || echo "false" )

          echo "deploy_h5=$DEPLOY_H5" >> $GITHUB_OUTPUT
          echo "deploy_web=$DEPLOY_WEB" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install ossutil
        run: |
          if ! command -v unzip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y unzip
          fi

          tmp_dir="$(mktemp -d)"
          cd "$tmp_dir"

          curl -fsSLo ossutil.zip "https://gosspublic.alicdn.com/ossutil/v2/${OSSUTIL_VERSION}/ossutil-${OSSUTIL_VERSION}-linux-amd64.zip"
          echo "${OSSUTIL_LINUX_AMD64_SHA256}  ossutil.zip" | sha256sum -c -
          unzip -q ossutil.zip
          sudo install -m 755 "ossutil-${OSSUTIL_VERSION}-linux-amd64/ossutil" /usr/local/bin/ossutil
          ossutil version

      - name: Build apps in parallel
        run: |
          pids=()
          if [ "$DEPLOY_H5" = "true" ]; then
            echo "Building H5..."
            pnpm run build:h5 &
            pids+=($!)
          fi
          if [ "$DEPLOY_WEB" = "true" ]; then
            echo "Building Web..."
            pnpm run build:web &
            pids+=($!)
          fi
          # 等待所有构建完成，任一失败则整体失败
          for pid in "${pids[@]}"; do
            wait "$pid" || exit 1
          done
        env:
          DEPLOY_H5: ${{ steps.changes.outputs.deploy_h5 }}
          DEPLOY_WEB: ${{ steps.changes.outputs.deploy_web }}
          VITE_WX_APP_ID: ${{ secrets.APP_ID }}
          VITE_SITE_ADDRESS: ${{ secrets.H5_SITE }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          VITE_SENTRY_ENVIRONMENT: ${{ secrets.VITE_SENTRY_ENVIRONMENT }}
          H5_SENTRY_PROJECT: ${{ secrets.H5_SENTRY_PROJECT }}
          H5_SENTRY_DSN: ${{ secrets.H5_SENTRY_DSN }}
          WEB_SENTRY_PROJECT: ${{ secrets.WEB_SENTRY_PROJECT }}
          WEB_SENTRY_DSN: ${{ secrets.WEB_SENTRY_DSN }}
          H5_SENTRY_RELEASE: ${{ secrets.H5_SENTRY_RELEASE }}
          WEB_SENTRY_RELEASE: ${{ secrets.WEB_SENTRY_RELEASE }}

      - name: Validate OSS settings
        run: |
          missing=()
          for key in ALIYUN_OSS_ACCESS_KEY_ID ALIYUN_OSS_ACCESS_KEY_SECRET ALIYUN_OSS_REGION ALIYUN_OSS_BUCKET; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub Secrets for OSS deployment:"
            printf -- '- %s\n' "${missing[@]}"
            exit 1
          fi

          if [[ "$ALIYUN_OSS_REGION" == cn-* ]] && [ -z "$ALIYUN_OSS_ENDPOINT" ]; then
            echo "::warning::ALIYUN_OSS_ENDPOINT 未配置。若 Bucket 位于中国内地且同步失败，请将 Bucket 绑定的自定义域名(CNAME)填入该 Secret。"
          fi

      - name: Deploy to OSS
        id: deploy_oss
        run: |
          ./scripts/deploy-oss.sh
        env:
          DEPLOY_H5: ${{ steps.changes.outputs.deploy_h5 }}
          DEPLOY_WEB: ${{ steps.changes.outputs.deploy_web }}

      - name: Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- H5 artifact: ${{ steps.changes.outputs.deploy_h5 == 'true' && 'selected' || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web artifact: ${{ steps.changes.outputs.deploy_web == 'true' && 'selected' || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- OSS deploy step: ${{ steps.deploy_oss.outcome || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
